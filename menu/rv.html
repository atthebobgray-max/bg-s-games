<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Old TV</title>

<style>
body {
  margin:0;
  background:#040404;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family: monospace;
}

/* room glow */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at center,
    rgba(0,255,220,0.08),
    rgba(0,0,0,1) 65%
  );
  pointer-events:none;
}

/* TV */
.tv {
  width:840px;
  height:540px;
  background: linear-gradient(145deg, #4a3624, #1a120b);
  border-radius:32px;
  padding:18px;
  position:relative;
  box-shadow:
    0 0 90px rgba(0,0,0,0.9),
    0 0 140px rgba(0,255,220,0.08);
}

/* speaker */
.tv::after {
  content:"";
  position:absolute;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  width:65%;
  height:12px;
  background: repeating-linear-gradient(
    to right,
    #000 0px,
    #222 6px,
    #000 10px
  );
  border-radius:8px;
  opacity:0.7;
}

/* SCREEN */
.screen {
  width:100%;
  height:76%;
  background:black;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  box-shadow: inset 0 0 100px rgba(0,0,0,0.95);
}

video {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* scanlines */
.screen::after {
  content:"";
  position:absolute;
  inset:0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.025),
    rgba(0,0,0,0.06) 2px
  );
  pointer-events:none;
}

/* glow */
.glow {
  box-shadow:
    0 0 60px rgba(0,255,220,0.25),
    0 0 140px rgba(0,255,220,0.35),
    inset 0 0 90px rgba(0,0,0,0.8);
}

/* countdown */
#countdown {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:90px;
  color:white;
  text-shadow:0 0 25px black;
  display:none;
}

/* ===== CONTROL PANEL ===== */
.controls {
  position:absolute;
  bottom:18px;
  left:18px;
  right:18px;

  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;

  padding:12px;
  background:rgba(0,0,0,0.35);
  border-radius:14px;
  box-shadow: inset 0 0 12px rgba(0,0,0,0.8);
}

/* VIDEO BUTTON (MAIN ONE) */
.video-btn {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#1f1f1f;
  color:#fff;
  font-family: monospace;
  cursor:pointer;
  font-size:13px;
  letter-spacing:1px;
  transition:0.2s;
}

.video-btn:hover {
  background:#333;
  transform:scale(1.05);
}

/* other buttons */
.controls button {
  flex:1;
  padding:9px;
  border:none;
  border-radius:8px;
  background:#222;
  color:#ddd;
  font-family: monospace;
  cursor:pointer;
  font-size:12px;
  transition:0.2s;
}

.controls button:hover {
  background:#333;
  transform:scale(1.03);
}

/* hide file input */
#fileInput {
  display:none;
}

/* filters */
.bw { filter: grayscale(100%) contrast(1.2); }
.old-sound { filter: contrast(1.4) saturate(0.6) blur(0.3px); }
</style>
</head>

<body>

<div class="tv">

  <div class="screen" id="screen">
    <video id="video"></video>
    <div id="countdown">3</div>
  </div>

  <div class="controls">

    <input type="file" accept="video/*" id="fileInput">

    <button class="video-btn" onclick="document.getElementById('fileInput').click()">
      ▶ VIDEO
    </button>

    <button onclick="setColor()">Color</button>
    <button onclick="setBW()">B/W</button>
    <button onclick="toggleSound()">Old Sound</button>

  </div>

</div>

<script>
const video = document.getElementById("video");
const screen = document.getElementById("screen");
const countdownEl = document.getElementById("countdown");

function setBW(){
  video.style.filter = "grayscale(100%)";
}

function setColor(){
  video.style.filter = "none";
}

function toggleSound(){
  video.classList.toggle("old-sound");
}

/* countdown */
function countdown(playFn){
  let c = 3;
  countdownEl.style.display = "block";
  countdownEl.textContent = c;

  const t = setInterval(()=>{
    c--;
    if(c > 0){
      countdownEl.textContent = c;
    } else {
      clearInterval(t);
      countdownEl.style.display = "none";
      playFn();
    }
  }, 700);
}

/* load video */
document.getElementById("fileInput").addEventListener("change",(e)=>{
  const file = e.target.files[0];
  if(!file) return;

  video.src = URL.createObjectURL(file);
  video.load();

  screen.classList.add("glow");

  countdown(()=>{
    video.play();
  });
});
</script>

</body>
</html>
