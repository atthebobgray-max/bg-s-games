<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Name Location Finder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }

    input {
      padding: 12px;
      width: 250px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-size: 16px;
      margin-left: 10px;
    }

    #results {
      margin-top: 30px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }

    .place {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      display: flex;
      gap: 15px;
      align-items: center;
    }

    img {
      width: 120px;
      height: 90px;
      object-fit: cover;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <h1>🌍 Name Location Finder</h1>

  <input type="text" id="nameInput" placeholder="Enter any name..." />
  <button onclick="searchName()">Search</button>

  <div id="results"></div>

  <script>
    async function getWikiImage(placeName) {
      try {
        const res = await fetch(
          `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(placeName)}`
        );
        const data = await res.json();

        if (data.thumbnail && data.thumbnail.source) {
          return data.thumbnail.source;
        }
      } catch (e) {}

      return null;
    }

    async function searchName() {
      const name = document.getElementById("nameInput").value;
      const resultsDiv = document.getElementById("results");

      if (!name) {
        resultsDiv.innerHTML = "<p>Please enter a name.</p>";
        return;
      }

      resultsDiv.innerHTML = "<p>Searching...</p>";

      try {
        const response = await fetch(
          `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(name)}`
        );

        const data = await response.json();

        if (data.length === 0) {
          resultsDiv.innerHTML = "<p>No locations found.</p>";
          return;
        }

        resultsDiv.innerHTML = "";

        for (let place of data.slice(0, 8)) {
          const div = document.createElement("div");
          div.className = "place";

          const title = place.display_name.split(",")[0];
          const image = await getWikiImage(title);

          div.innerHTML = `
            ${image ? `<img src="${image}" alt="image">` : ""}
            <div>
              <strong>${place.display_name}</strong><br>
              Lat: ${place.lat}, Lon: ${place.lon}
            </div>
          `;

          resultsDiv.appendChild(div);
        }

      } catch (error) {
        resultsDiv.innerHTML = "<p>Error fetching data.</p>";
        console.error(error);
      }
    }
  </script>

</body>
</html>
