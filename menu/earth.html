<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Earth Timeline Simulator ULTRA</title>

<style>
  *{
    box-sizing:border-box;
  }

  body{
    margin:0;
    overflow:hidden;
    background:
      radial-gradient(circle at center,#0b1020,#000);
    font-family:Arial,Helvetica,sans-serif;
  }

  canvas{
    display:block;
  }

  #ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
    color:white;
  }

  #panel{
    width:290px;
    max-height:90vh;
    overflow-y:auto;
    background:rgba(0,0,0,0.55);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    border-radius:16px;
    padding:12px;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
  }

  #stats{
    font-size:13px;
    line-height:1.8;
    color:#7dffde;
  }

  #yearBox{
    margin-top:10px;
    margin-bottom:10px;
  }

  #yearLabel{
    color:#fff;
    font-weight:bold;
  }

  input[type=range]{
    width:100%;
    margin-top:6px;
  }

  #buttons{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
  }

  button{
    border:none;
    border-radius:10px;
    padding:10px;
    cursor:pointer;
    color:white;
    font-size:11px;
    font-weight:bold;
    transition:0.25s;
    background:linear-gradient(135deg,#1d2d50,#133b5c);
  }

  button:hover{
    transform:scale(1.05);
    background:linear-gradient(135deg,#2d4f8c,#1b5f94);
    box-shadow:0 0 15px rgba(0,200,255,0.5);
  }

  #log{
    margin-top:10px;
    height:140px;
    overflow-y:auto;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
    padding:8px;
    font-size:11px;
  }

  #title{
    font-size:20px;
    margin-bottom:8px;
    font-weight:bold;
    color:#ffffff;
    text-shadow:0 0 10px cyan;
  }
</style>
</head>

<body>

<div id="ui">
  <div id="panel">

    <div id="title">🌍 Earth Timeline</div>

    <div id="stats">
      👨 Population:
      <span id="pop">1000</span><br>

      ☠️ Pollution:
      <span id="pol">0</span><br>

      🚀 Future Tech:
      <span id="tech">Primitive</span>
    </div>

    <div id="yearBox">
      ⏳ Year:
      <span id="yearLabel">1 BC</span>

      <input
        id="yearSlider"
        type="range"
        min="-1"
        max="5050"
        value="-1"
      >
    </div>

    <div id="buttons"></div>

    <div id="log"></div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/* =========================================================
   SCENE
========================================================= */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  60,
  innerWidth/innerHeight,
  0.1,
  2000
);

camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({
  antialias:true
});

renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(devicePixelRatio);

document.body.appendChild(renderer.domElement);

/* =========================================================
   STARS
========================================================= */

const starGeo = new THREE.BufferGeometry();
const starCount = 3000;

const starVertices = [];

for(let i=0;i<starCount;i++){

  starVertices.push(
    (Math.random()-0.5)*2000,
    (Math.random()-0.5)*2000,
    (Math.random()-0.5)*2000
  );
}

starGeo.setAttribute(
  "position",
  new THREE.Float32BufferAttribute(starVertices,3)
);

const stars = new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({
    color:0xffffff,
    size:0.7
  })
);

scene.add(stars);

/* =========================================================
   EARTH
========================================================= */

let earth;
let clouds;
let atmosphere;

const loader = new THREE.TextureLoader();

earth = new THREE.Mesh(

  new THREE.SphereGeometry(1,128,128),

  new THREE.MeshStandardMaterial({

    map:loader.load(
      "https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg"
    ),

    roughness:1,
    metalness:0
  })
);

scene.add(earth);

/* Clouds */

clouds = new THREE.Mesh(

  new THREE.SphereGeometry(1.01,128,128),

  new THREE.MeshStandardMaterial({

    map:loader.load(
      "https://threejs.org/examples/textures/planets/earth_clouds_1024.png"
    ),

    transparent:true,
    opacity:0.5
  })
);

scene.add(clouds);

/* Atmosphere */

atmosphere = new THREE.Mesh(

  new THREE.SphereGeometry(1.08,128,128),

  new THREE.MeshBasicMaterial({
    color:0x44bbff,
    transparent:true,
    opacity:0.15,
    side:THREE.BackSide
  })
);

scene.add(atmosphere);

/* =========================================================
   LIGHTS
========================================================= */

scene.add(
  new THREE.AmbientLight(0x557799,0.6)
);

const sun = new THREE.DirectionalLight(
  0xffffff,
  2.4
);

sun.position.set(5,2,5);

scene.add(sun);

/* =========================================================
   STATE
========================================================= */

let population = 1000;
let pollution = 0;
let year = -1;

const popUI = document.getElementById("pop");
const polUI = document.getElementById("pol");
const yearLabel = document.getElementById("yearLabel");
const slider = document.getElementById("yearSlider");
const techUI = document.getElementById("tech");

const log = document.getElementById("log");

function logMsg(txt){

  log.innerHTML =
    txt + "<br>" + log.innerHTML;
}

function updateUI(){

  popUI.innerText =
    Math.max(0,population);

  polUI.innerText =
    Math.floor(Math.max(0,pollution));

  if(year < 2100){
    techUI.innerText = "Modern";
  }
  else if(year < 3500){
    techUI.innerText = "Advanced";
  }
  else{
    techUI.innerText = "Galactic";
  }
}

/* =========================================================
   PARTICLES
========================================================= */

const particles = [];

function explosion(color,size=0.02,count=40){

  for(let i=0;i<count;i++){

    const mesh = new THREE.Mesh(

      new THREE.SphereGeometry(size,6,6),

      new THREE.MeshBasicMaterial({
        color
      })
    );

    mesh.position.copy(earth.position);

    scene.add(mesh);

    particles.push({

      mesh,

      velocity:new THREE.Vector3(
        (Math.random()-0.5)*0.1,
        (Math.random()-0.5)*0.1,
        (Math.random()-0.5)*0.1
      ),

      life:1
    });
  }
}

/* =========================================================
   METEORS
========================================================= */

const meteors = [];

function spawnAsteroid(){

  const rock = new THREE.Mesh(

    new THREE.SphereGeometry(0.08,18,18),

    new THREE.MeshStandardMaterial({

      color:0xff5500,
      emissive:0xff2200
    })
  );

  rock.position.set(
    (Math.random()-0.5)*6,
    (Math.random()-0.5)*6,
    4
  );

  scene.add(rock);

  meteors.push({

    mesh:rock,

    velocity:new THREE.Vector3(
      -rock.position.x,
      -rock.position.y,
      -rock.position.z
    ).normalize().multiplyScalar(0.04)
  });

  logMsg("☄️ Massive asteroid incoming");
}

/* =========================================================
   FUTURE VEHICLES
========================================================= */

const flyingCars = [];
const spaceships = [];
const alienShips = [];

function createFlyingCars(){

  for(let i=0;i<12;i++){

    const car = new THREE.Mesh(

      new THREE.BoxGeometry(
        0.05,
        0.02,
        0.02
      ),

      new THREE.MeshStandardMaterial({
        color:0x00ffff,
        emissive:0x00ffff,
        emissiveIntensity:1
      })
    );

    scene.add(car);

    flyingCars.push({

      mesh:car,

      angle:Math.random()*Math.PI*2,

      radius:1.5 + Math.random()*0.6,

      speed:0.01 + Math.random()*0.02,

      y:(Math.random()-0.5)*0.8
    });
  }

  logMsg("🚗 Flying cars activated");
}

function createSpaceships(){

  for(let i=0;i<6;i++){

    const ship = new THREE.Mesh(

      new THREE.ConeGeometry(
        0.05,
        0.16,
        10
      ),

      new THREE.MeshStandardMaterial({

        color:0xffffff,
        emissive:0x66ccff,
        emissiveIntensity:2
      })
    );

    scene.add(ship);

    spaceships.push({

      mesh:ship,

      angle:Math.random()*Math.PI*2,

      radius:2 + Math.random()*0.8,

      speed:0.008 + Math.random()*0.01
    });
  }

  logMsg("🚀 Deep-space ships online");
}

function summonAlienShip(){

  const ship = new THREE.Mesh(

    new THREE.CylinderGeometry(
      0.15,
      0.3,
      0.08,
      32
    ),

    new THREE.MeshStandardMaterial({

      color:0x00ff88,
      emissive:0x00ff88,
      emissiveIntensity:2,
      metalness:1
    })
  );

  ship.position.set(0,2,0);

  scene.add(ship);

  alienShips.push({

    mesh:ship,

    t:0
  });

  explosion(0x00ff88,0.03,60);

  logMsg("🛸 Alien mothership arrived");
}

/* =========================================================
   YEAR SYSTEM
========================================================= */

slider.oninput = (e)=>{

  year = parseInt(e.target.value);

  yearLabel.innerText =
    year <= 0
      ? `${Math.abs(year)} BC`
      : year;

  applyTimeline();
};

function applyTimeline(){

  const t = Math.max(0,year/5050);

  population =
    Math.floor(
      1000 + t*9000000
    );

  pollution =
    t*100;

  earth.material.color =
    new THREE.Color(
      1 - t*0.35,
      1 - t*0.45,
      1 - t*0.25
    );

  atmosphere.material.opacity =
    0.15 + t*0.2;

  if(year > 3000 && flyingCars.length===0){

    createFlyingCars();
  }

  if(year > 4200 && spaceships.length===0){

    createSpaceships();
  }

  if(year > 4500){

    atmosphere.material.color.set(0xaa66ff);
  }

  updateUI();
}

/* =========================================================
   EFFECTS
========================================================= */

function pulse(color){

  earth.material.emissive =
    new THREE.Color(color);

  earth.material.emissiveIntensity = 1.8;

  setTimeout(()=>{

    earth.material.emissiveIntensity = 0;

  },300);
}

/* =========================================================
   BUTTONS
========================================================= */

const actions = [

["🌱 Heal",()=>{

  pollution -= 20;

  pulse(0x00ff88);

  explosion(0x00ff88);

  logMsg("🌍 Earth healed");
}],

["⚔️ War",()=>{

  population -= 400;

  pollution += 20;

  pulse(0xff0000);

  explosion(0xff0000);

  logMsg("⚔️ Global war");
}],

["☄️ Asteroid",()=>{

  spawnAsteroid();
}],

["🌋 Volcano",()=>{

  pollution += 18;

  pulse(0xff6600);

  explosion(0xff6600);

  logMsg("🌋 Volcano eruption");
}],

["🌊 Flood",()=>{

  population -= 250;

  pulse(0x0088ff);

  explosion(0x0088ff);

  logMsg("🌊 Mega flood");
}],

["🌪️ Storm",()=>{

  population -= 180;

  pulse(0xcccccc);

  explosion(0xffffff);

  logMsg("🌪️ Hyper storm");
}],

["🦠 Pandemic",()=>{

  population -= 500;

  pulse(0x00ff00);

  explosion(0x00ff00);

  logMsg("🦠 Virus spreading");
}],

["🚀 Space Age",()=>{

  createSpaceships();

  pulse(0x66ccff);

  logMsg("🚀 Space expansion");
}],

["🤖 AI Rise",()=>{

  pulse(0xff00ff);

  pollution += 10;

  logMsg("🤖 AI domination");
}],

["🤖 AI Help",()=>{

  population += 500;

  pollution -= 10;

  pulse(0x00ffff);

  explosion(0x00ffff);

  logMsg("🤖 AI restored Earth");
}],

["🌿 Nature",()=>{

  pollution -= 30;

  pulse(0x00ff00);

  explosion(0x00ff00);

  logMsg("🌿 Nature recovered");
}],

["🛸 Aliens",()=>{

  summonAlienShip();

  population += 1000;
}],

["💥 Crash",()=>{

  population -= 300;

  pollution += 15;

  pulse(0xff0000);

  explosion(0xff0000);

  logMsg("💥 System collapse");
}],

["🚗 Flying Cars",()=>{

  createFlyingCars();

  pulse(0x00ffff);
}],

["🌌 Galaxy",()=>{

  createSpaceships();

  createFlyingCars();

  pulse(0xaa66ff);

  explosion(0xaa66ff,0.03,80);

  logMsg("🌌 Galactic civilization");
}],

["🌞 Solar Flare",()=>{

  pulse(0xffaa00);

  explosion(0xffaa00);

  pollution += 10;

  logMsg("🌞 Solar flare");
}],

["🪨 Quake",()=>{

  pulse(0x777777);

  explosion(0x777777);

  population -= 350;

  logMsg("🪨 Earthquake");
}],

["🌈 Paradise",()=>{

  pollution = 0;

  population += 2000;

  pulse(0xffffff);

  explosion(0xffffff,0.04,100);

  logMsg("🌈 Perfect Earth");
}],

["🧊 Ice Age",()=>{

  pulse(0x88ccff);

  explosion(0x88ccff);

  population -= 400;

  logMsg("🧊 Ice age");
}],

["🔄 Restart",()=>{

  location.reload();
}]

];

/* =========================================================
   BUILD BUTTONS
========================================================= */

const btnDiv = document.getElementById("buttons");

actions.forEach(action=>{

  const b = document.createElement("button");

  b.innerText = action[0];

  b.onclick = ()=>{

    action[1]();

    updateUI();
  };

  btnDiv.appendChild(b);
});

/* =========================================================
   DRAG ROTATE
========================================================= */

let dragging = false;

let prevX = 0;
let prevY = 0;

document.addEventListener("mousedown",(e)=>{

  dragging = true;

  prevX = e.clientX;
  prevY = e.clientY;
});

document.addEventListener("mouseup",()=>{

  dragging = false;
});

document.addEventListener("mousemove",(e)=>{

  if(!dragging) return;

  earth.rotation.y +=
    (e.clientX-prevX)*0.005;

  earth.rotation.x +=
    (e.clientY-prevY)*0.005;

  clouds.rotation.y +=
    (e.clientX-prevX)*0.004;

  prevX = e.clientX;
  prevY = e.clientY;
});

/* =========================================================
   ANIMATION LOOP
========================================================= */

function animate(){

  requestAnimationFrame(animate);

  earth.rotation.y += 0.0015;

  clouds.rotation.y += 0.0018;

  stars.rotation.y += 0.00008;

  /* Particles */

  for(let i=particles.length-1;i>=0;i--){

    const p = particles[i];

    p.mesh.position.add(p.velocity);

    p.mesh.scale.addScalar(0.01);

    p.life -= 0.02;

    p.mesh.material.opacity = p.life;

    if(p.life <= 0){

      scene.remove(p.mesh);

      particles.splice(i,1);
    }
  }

  /* Meteors */

  for(let i=meteors.length-1;i>=0;i--){

    const m = meteors[i];

    m.mesh.position.add(m.velocity);

    m.mesh.rotation.x += 0.1;
    m.mesh.rotation.y += 0.1;

    if(m.mesh.position.length() < 1.05){

      explosion(0xff6600,0.03,80);

      pulse(0xff3300);

      population -= 800;

      pollution += 25;

      scene.remove(m.mesh);

      meteors.splice(i,1);

      logMsg("💥 Asteroid impact");
    }
  }

  /* Flying Cars */

  flyingCars.forEach(car=>{

    car.angle += car.speed;

    car.mesh.position.set(

      Math.cos(car.angle)*car.radius,

      car.y + Math.sin(car.angle*3)*0.1,

      Math.sin(car.angle)*car.radius
    );

    car.mesh.lookAt(earth.position);
  });

  /* Spaceships */

  spaceships.forEach(ship=>{

    ship.angle += ship.speed;

    ship.mesh.position.set(

      Math.cos(ship.angle)*ship.radius,

      Math.sin(ship.angle*2)*0.6,

      Math.sin(ship.angle)*ship.radius
    );

    ship.mesh.rotation.z += 0.03;
  });

  /* Alien Ships */

  alienShips.forEach(a=>{

    a.t += 0.02;

    a.mesh.position.y =
      1.8 + Math.sin(a.t)*0.2;

    a.mesh.rotation.y += 0.02;
  });

  renderer.render(scene,camera);
}

animate();

/* =========================================================
   RESIZE
========================================================= */

window.addEventListener("resize",()=>{

  camera.aspect =
    innerWidth/innerHeight;

  camera.updateProjectionMatrix();

  renderer.setSize(
    innerWidth,
    innerHeight
  );
});

updateUI();

</script>

</body>
</html>
