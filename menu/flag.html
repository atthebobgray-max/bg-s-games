<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guess the Flag - No Repeats</title>

<style>
    body {
        font-family: Arial;
        background: #0b1020;
        color: white;
        text-align: center;
        padding: 20px;
    }

    #flag img {
        width: 200px;
        border-radius: 10px;
        margin: 20px;
    }

    button {
        display: block;
        width: 60%;
        margin: 10px auto;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #1f2937;
        color: white;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        background: #334155;
    }

    .start {
        background: #22c55e;
        color: black;
    }
</style>
</head>

<body>

<h1>🚩 Guess the Flag (No Repeats)</h1>

<div id="flag"></div>

<div id="options"></div>

<button class="start" onclick="startGame()">Start Game</button>

<p id="result"></p>

<script>

const allFlags = [
    { name: "USA", code: "us" },
    { name: "UK", code: "gb" },
    { name: "France", code: "fr" },
    { name: "Germany", code: "de" },
    { name: "India", code: "in" },
    { name: "Japan", code: "jp" },
    { name: "Brazil", code: "br" },
    { name: "Canada", code: "ca" },
    { name: "Italy", code: "it" },
    { name: "Spain", code: "es" }
];

let deck = [];
let current = null;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function startGame() {
    deck = [...allFlags];   // copy
    shuffle(deck);
    next();
}

function next() {
    if (deck.length === 0) {
        document.getElementById("flag").innerHTML = "<h2>🎉 Game Finished!</h2>";
        document.getElementById("options").innerHTML = "";
        return;
    }

    current = deck.pop(); // removes used flag (NO REPEAT)

    document.getElementById("flag").innerHTML =
        `<img src="https://flagcdn.com/w320/${current.code}.png">`;

    document.getElementById("result").innerText = "";

    let options = generateOptions(current.name);

    let box = document.getElementById("options");
    box.innerHTML = "";

    options.forEach(opt => {
        let btn = document.createElement("button");
        btn.innerText = opt;

        btn.onclick = () => {
            if (opt === current.name) {
                document.getElementById("result").innerText = "✅ Correct!";
            } else {
                document.getElementById("result").innerText =
                    "❌ Wrong! It was " + current.name;
            }

            setTimeout(next, 800);
        };

        box.appendChild(btn);
    });
}

function generateOptions(correct) {
    let arr = [correct];

    while (arr.length < 4) {
        let r = allFlags[Math.floor(Math.random() * allFlags.length)].name;
        if (!arr.includes(r)) arr.push(r);
    }

    return arr.sort(() => Math.random() - 0.5);
}

</script>

</body>
</html>
