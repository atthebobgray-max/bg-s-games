body {
    margin: 0;

    font-family: Arial, sans-serif;
}

h1 {
    text-align: center;
    margin-top: 20px;
}

.menu {
    display: flex;
    justify-content: center;
    gap: 100px;
    margin-top: 40px;
}

.column {
    display: flex;
    flex-direction: column;
    gap: 25px;
}

/* FIXED LINK BUTTON STYLE */
.game-button {
    width: 250px;
    height: 120px;
    display: block;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    text-decoration: none;
}

/* IMAGE */
.game-button img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
}

/* TEXT */
.game-button span {
    position: relative;
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 0 5px black;
    z-index: 2;
}

/* DARK OVERLAY */
.game-button::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.35);
}
</style>

</head>
