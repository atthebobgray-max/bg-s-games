<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Universal Emoji Reactor</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
}

#top {
  height: 30vh;
  background: #000;
  padding: 10px;
  overflow-y: auto;
}

.goal {
  padding: 6px;
  margin: 4px 0;
  background: #222;
  border-radius: 6px;
}

.done {
  color: #00ff4c;
  text-decoration: line-through;
}

#center {
  height: 40vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 65px;
  flex-direction: column;
  text-align: center;
}

#keyboard {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 30vh;
  background: #222;
  display: flex;
  flex-wrap: wrap;
  padding: 10px;
  gap: 4px;
  overflow-y: auto;
}

.key {
  width: 38px;
  height: 38px;
  font-size: 20px;
  background: #333;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 5px;
  cursor: pointer;
}

.selected {
  outline: 2px solid yellow;
}
</style>
</head>
<body>

<div id="top">
  <div id="status"></div>
  <div id="goals"></div>
</div>

<div id="center">
  <div id="big">👆</div>
</div>

<div id="keyboard"></div>

<script>

/*
========================
BASE EMOJIS ONLY (NOT EXPANDED)
========================
*/

const EMOJIS = [
  "🧑","👨","👩","🧒","👶","🧓",
  "👹","👻","💀","🧟","🧛","😈","👽","🤖","👾",
  "🐶","🐱","🐺","🦊","🐻","🐸","🐍","🐉",
  "🍎","🍔","🍕","🍣","🍪","🍫","🍗","🌭","🍩","🥩",
  "🔥","⚡","❄️","🌪️","☠️","🌑","🌞","🌿",
  "🧙","🧝","🧌","🦇","🦂","🕷️","🐙","🦑",
  "🦖","🦕","🦍","🦣","🦔","🪄","🔮","🧠","👁️","🦴","⚔️"
];

/*
========================
NAME ENGINE
========================
*/

const PREFIXES = [
  "Ancient","Dark","Cursed","Holy","Cyber","Void",
  "Feral","Infernal","Frozen","Storm","Radiant","Glitched"
];

const SUFFIXES = [
  "Beast","Entity","Walker","Lord","Spirit","Chimera",
  "Hybrid","King","Queen","Horror","Titan","Shade"
];

const CORE = {
  "🧟":"Zombie","👹":"Oni","👻":"Ghost","💀":"Reaper",
  "🧛":"Vampire","😈":"Demon","👽":"Alien","🤖":"Machine",
  "👾":"Glitch","🐶":"Hound","🐱":"Cat","🐉":"Dragon",
  "🔥":"Flame","⚡":"Storm","❄️":"Frost","🌪️":"Tempest",
  "🍔":"Food","🍕":"Slice","🍫":"Sweet","🧙":"Mage",
  "🧝":"Elf","🧌":"Troll","🧠":"Mind","👁️":"Void Eye"
};

/*
========================
UNIVERSAL REACTION ENGINE
========================
*/

function combine(a,b){
  let key = [a,b].sort().join("|");

  let seed = hash(key);

  let A = CORE[a] || "Entity";
  let B = CORE[b] || "Entity";

  let prefix = PREFIXES[seed % PREFIXES.length];
  let suffix = SUFFIXES[(seed >> 2) % SUFFIXES.length];

  let styles = [
    `${prefix} ${A}-${B}`,
    `${A} of ${B}`,
    `${prefix} Fusion ${A}`,
    `${A}-${B} ${suffix}`,
    `${prefix} ${A} ${suffix}`
  ];

  return {
    key,
    emoji: a + "✨" + b,
    name: styles[seed % styles.length]
  };
}

/*
========================
HASH
========================
*/

function hash(str){
  let h = 0;
  for(let i=0;i<str.length;i++){
    h = (h * 31 + str.charCodeAt(i)) >>> 0;
  }
  return h;
}

/*
========================
STATE
========================
*/

let selected = null;
let goals = [];
let done = new Set();
let start = Date.now();
let timer;

/*
========================
UI
========================
*/

const keyboard = document.getElementById("keyboard");
const goalsDiv = document.getElementById("goals");
const status = document.getElementById("status");
const big = document.getElementById("big");

/*
========================
RENDER GRID (ONLY BASE EMOJIS)
========================
*/

function renderKeyboard(){
  keyboard.innerHTML = "";

  EMOJIS.forEach(e=>{
    let d = document.createElement("div");
    d.className = "key";
    d.textContent = e;

    if(e === selected) d.classList.add("selected");

    d.onclick = ()=>pick(e);

    keyboard.appendChild(d);
  });
}

/*
========================
ROUND
========================
*/

function newRound(){
  goals = [];
  done = new Set();

  let pool = [...EMOJIS];
  shuffle(pool);

  for(let i=0;i<10;i++){
    goals.push(combine(pool[i], pool[i+1]));
  }

  start = Date.now();

  renderGoals();
  renderKeyboard();

  clearInterval(timer);
  timer = setInterval(update,1000);
}

function update(){
  let t = Math.floor((Date.now()-start)/1000);
  status.textContent = `Time: ${t}s | Correct: ${done.size}/10`;
}

/*
========================
GOALS
========================
*/

function renderGoals(){
  goalsDiv.innerHTML = "";
  goals.forEach(g=>{
    let d = document.createElement("div");
    d.className = "goal";
    d.textContent = g.name;
    d.dataset.key = g.key;
    goalsDiv.appendChild(d);
  });
}

/*
========================
GAMEPLAY
========================
*/

function pick(e){
  if(!selected){
    selected = e;
  } else {
    if(selected === e){
      selected = null;
      renderKeyboard();
      return;
    }

    let r = combine(selected,e);

    big.textContent = r.name;

    check(r);

    selected = null;
  }

  renderKeyboard();
}

function check(r){
  goals.forEach(g=>{
    if(g.key === r.key && !done.has(g.key)){
      done.add(g.key);

      let el = [...document.querySelectorAll(".goal")]
        .find(x=>x.dataset.key === g.key);

      if(el) el.classList.add("done");

      if(done.size === 10) win();
    }
  });
}

function win(){
  clearInterval(timer);
  let t = Math.floor((Date.now()-start)/1000);
  status.textContent = `YOU WIN! ${t}s`;
  setTimeout(newRound,2000);
}

/*
UTIL
*/

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

/*
START
*/

newRound();

</script>

</body>
</html>
