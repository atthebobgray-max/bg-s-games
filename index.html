<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bob's Games</title>

<style>
body {
    margin: 0;
    background: white;
    font-family: Arial, sans-serif;
}

h1 {
    text-align: center;
    margin-top: 20px;
}

/* Layout */
.menu {
    display: flex;
    justify-content: center;
    gap: 100px;
    margin-top: 40px;
}

.column {
    display: flex;
    flex-direction: column;
    gap: 25px;
}

/* CARD BUTTON (now the <a> tag) */
.game-button {
    width: 250px;
    height: 120px;
    display: block;
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    text-decoration: none;
}

/* Image */
.game-button img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
}

/* Text */
.game-button span {
    position: relative;
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 0 5px black;
    z-index: 2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
}

/* Dark overlay */
.game-button::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.35);
}
</style>

</head>

<body>

<h1>Bob's Games</h1>

<div class="menu">

    <!-- LEFT COLUMN -->
    <div class="column">

        <a class="game-button" href="earth2.html">
            <img src="https://thfvnext.bing.com/th/id/OIP.oCekuazOEg_tuxObbDH9VwHaFA?w=260&h=180">
            <span>Territory wars!!</span>
        </a>

        <a class="game-button" href="earth.html">
            <img src="https://thfvnext.bing.com/th/id/OIP.7psOipzjmMOcPM8dwMLh9gHaNK?w=115&h=180">
            <span>Random earth game</span>
        </a>

        <a class="game-button" href="emojis.html">
            <img src="https://thfvnext.bing.com/th/id/OIP.ljE4PG6q_A_aga_IvzvH2QHaFj?w=258&h=194">
            <span>Make random emojis</span>
        </a>

        <a class="game-button" href="hangman.html">
            <img src="https://via.placeholder.com/250x120?text=Hangman">
            <span>Hangman</span>
        </a>

        <a class="game-button" href="rv.html">
            <img src="https://via.placeholder.com/250x120?text=Old+TV">
            <span>Old TV</span>
        </a>

    </div>

    <!-- RIGHT COLUMN -->
    <div class="column">

        <a class="game-button" href="trump.html">
            <img src="https://thfvnext.bing.com/th/id/OIP.bJRJVJyxNENnXlZ0Br3TFwHaEK?w=296&h=180">
            <span>Guess the president</span>
        </a>

        <a class="game-button" href="name.html">
            <img src="https://thfvnext.bing.com/th/id/OIP.BvYCcLY8EKczZ3mjkJzokwHaHa?w=174&h=180">
            <span>Find places with your name!!</span>
        </a>

        <a class="game-button" href="flag.html">
            <img src="https://via.placeholder.com/250x120?text=Flag+Game">
            <span>Guess the flag</span>
        </a>

        <a class="game-button" href="game9.html">
            <img src="images/game9.jpg">
            <span>Game 9</span>
        </a>

        <a class="game-button" href="game10.html">
            <img src="images/game10.jpg">
            <span>Game 10</span>
        </a>

    </div>

</div>

</body>
</html>
