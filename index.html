<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bob's Games</title>

<style>
body {
    margin: 0;
    background: white;
    font-family: Arial, sans-serif;
}

h1 {
    text-align: center;
    margin-top: 20px;
}

.menu {
    display: flex;
    justify-content: center;
    gap: 100px;
    margin-top: 40px;
}

.column {
    display: flex;
    flex-direction: column;
    gap: 25px;
}

.game-button {
    width: 250px;
    height: 120px;
    border: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    border-radius: 12px;
}

.game-button img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
}

.game-button span {
    position: relative;
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 0 5px black;
    z-index: 2;
}

.game-button::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.35);
}
</style>

</head>

<body>

<h1>Bob's Games</h1>

<div class="menu">

    <div class="column">

        <a href="./earth2.html">

                <span>Territory wars!!</span>
            </button>
        </a>

        <a href="./earth.html">

        <a href="./name.html">

</html>
