<style>
body {
    margin: 0;
    background: white;
    font-family: Arial, sans-serif;
}

/* Title */
h1 {
    text-align: center;
    margin-top: 20px;
}

/* Layout container */
.menu {
    display: flex;
    justify-content: center;
    gap: 100px;
    margin-top: 40px;
}

/* Columns */
.column {
    display: flex;
    flex-direction: column;
    gap: 25px;
}

/* Button styling */
.game-button {
    width: 250px;
    height: 120px;
    border: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    border-radius: 12px;
}

/* Image fills button */
.game-button img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
}

/* Text overlay */
.game-button span {
    position: relative;
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 0 5px black;
    z-index: 2;
}

/* Dark overlay for readability */
.game-button::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.35);
}
</style>
